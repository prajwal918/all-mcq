<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>All MCQ — Unit 1 & 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- KaTeX for beautiful math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
    --lime:#BEFF00;--lime-dim:rgba(190,255,0,.12);--lime-border:rgba(190,255,0,.3);
    --lime-glow:rgba(190,255,0,.06);
    --green:#4ade80;--green-bg:rgba(74,222,128,.1);--green-border:rgba(74,222,128,.3);
    --red:#ff4d6a;--red-bg:rgba(255,77,106,.1);--red-border:rgba(255,77,106,.3);
    --bg:#0a0a0a;--card:#141414;--card-hover:#1c1c1c;
    --text:#eee;--muted:#666;--border:#1f1f1f;
    --radius:16px;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{width:100%;max-width:600px;padding:1.25rem;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.progress-wrap{background:var(--border);border-radius:99px;height:4px;margin-bottom:1.25rem;overflow:hidden}
.progress-bar{height:100%;background:var(--lime);border-radius:99px;transition:width .4s ease}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.75rem;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hero{text-align:center;margin-bottom:2rem}
.hero .brand{font-size:2.8rem;margin-bottom:.5rem;display:block}
.hero h1{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:.3rem}
.hero p{color:var(--muted);font-size:.85rem}
.subject-grid{display:flex;flex-direction:column;gap:.6rem}
.subject-card{display:flex;align-items:center;gap:1rem;padding:1rem 1.1rem;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;background:var(--card)}
.subject-card:hover{background:var(--card-hover);border-color:var(--lime-border)}
.subject-card:active{transform:scale(.98)}
.subject-card .emoji{font-size:1.6rem}
.subject-card h3{font-size:.88rem;font-weight:700;color:#fff;margin-bottom:.15rem}
.subject-card p{font-size:.73rem;color:var(--muted)}
.q-badge{display:inline-block;font-size:.58rem;background:var(--lime);color:#000;padding:.15rem .5rem;border-radius:99px;font-weight:800;margin-top:.3rem}
.mode-cards{display:grid;gap:.7rem}
.mode-card{display:flex;align-items:center;gap:.9rem;padding:1.1rem;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;background:var(--card)}
.mode-card:hover{background:var(--card-hover)}
.mode-card:active{transform:scale(.98)}
.mode-card .emoji{font-size:1.6rem}
.mode-card h3{font-size:.9rem;font-weight:700;color:#fff;margin-bottom:.1rem}
.mode-card p{font-size:.76rem;color:var(--muted)}
.back-btn{display:inline-flex;align-items:center;gap:.35rem;background:none;border:none;color:var(--muted);font-size:.8rem;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:1.25rem;padding:.3rem 0;transition:color .15s}
.back-btn:hover{color:var(--lime)}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.35rem}
.counter{font-size:.78rem;color:var(--muted);font-weight:500}
.score-pill{background:var(--lime);color:#000;font-size:.7rem;font-weight:800;padding:.22rem .65rem;border-radius:99px}
.mode-pill{background:var(--border);color:var(--muted);font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:99px}
.q-number{font-size:.7rem;color:var(--lime);font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:.5rem}
.q-text{font-size:1rem;font-weight:500;line-height:1.6;margin-bottom:1.25rem;color:#fff}
.q-text .katex{font-size:1.1em}
.options{display:flex;flex-direction:column;gap:.5rem}
.opt-btn{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.87rem;font-family:inherit;text-align:left;transition:all .15s;line-height:1.4;width:100%}
.opt-btn:hover:not(:disabled){background:var(--card-hover)}
.opt-btn:active:not(:disabled){transform:scale(.985)}
.opt-btn .lbl{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);transition:all .15s}
.opt-btn .opt-text{flex:1;padding-top:3px;word-break:break-word}
.opt-btn.correct{background:var(--green-bg);border-color:var(--green-border)}
.opt-btn.correct .lbl{background:var(--green);color:#000;border-color:var(--green)}
.opt-btn.incorrect{background:var(--red-bg);border-color:var(--red-border)}
.opt-btn.incorrect .lbl{background:var(--red);color:#000;border-color:var(--red)}
.opt-btn.selected-exam{background:var(--lime-dim);border-color:var(--lime-border)}
.opt-btn.selected-exam .lbl{background:var(--lime);color:#000;border-color:var(--lime)}
.opt-btn:disabled{cursor:default}
.controls{margin-top:1.25rem;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.next-btn{background:var(--lime);color:#000;border:none;padding:.75rem 1.5rem;border-radius:10px;font-size:.88rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.next-btn:active{transform:scale(.97)}
.next-btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.result{text-align:center;padding:2rem .5rem}
.result .trophy{font-size:3.5rem;margin-bottom:.75rem}
.result h2{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:.3rem}
.result .big-score{font-size:3rem;font-weight:900;color:var(--lime);margin:.5rem 0}
.result .pct{font-size:.95rem;color:var(--muted);margin-bottom:1.25rem}
.grade{display:inline-block;padding:.35rem 1rem;border-radius:99px;font-weight:800;font-size:.88rem;margin-bottom:1.25rem}
.grade-a{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.grade-b{background:rgba(250,204,21,.08);color:#facc15;border:1px solid rgba(250,204,21,.25)}
.grade-c{background:rgba(251,146,60,.08);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.grade-f{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-row{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.action-btn{border:none;padding:.75rem 1.5rem;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.action-btn:active{transform:scale(.97)}
.action-btn.primary{background:var(--lime);color:#000}
.action-btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.hidden{display:none!important}
.tag{display:inline-block;background:var(--lime);color:#000;font-size:.62rem;font-weight:800;padding:.2rem .65rem;border-radius:99px;margin-bottom:.65rem;letter-spacing:.5px;text-transform:uppercase}
/* KaTeX overrides for dark theme */
.katex{color:var(--text)}
.katex .mord,.katex .mbin,.katex .mrel,.katex .mopen,.katex .mclose,.katex .mpunct,.katex .minner{color:var(--text)}
@media(max-width:480px){
    .container{padding:.75rem}
    .card{padding:1.25rem;border-radius:14px}
    .hero h1{font-size:1.25rem}
    .opt-btn{padding:.75rem .85rem;font-size:.84rem}
    .q-text{font-size:.92rem}
    .next-btn{flex:1;text-align:center}
}
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="subject-screen">
        <div class="hero">
            <span class="brand">📚</span>
            <h1>All MCQ — Units 1 & 2</h1>
            <p>Exam Preparation • Choose a subject</p>
        </div>
        <div class="subject-grid" id="subject-grid"></div>
    </div>
    <div class="card hidden" id="mode-screen">
        <button class="back-btn" onclick="showScreen('subject')">← Back</button>
        <div class="hero">
            <div class="icon" id="mode-icon" style="font-size:2.5rem;margin-bottom:.5rem"></div>
            <span class="tag" id="mode-badge">UNIT 1</span>
            <h1 id="mode-title">Subject</h1>
            <p id="mode-desc">Description</p>
        </div>
        <div class="mode-cards">
            <div class="mode-card" onclick="startQuiz('practice')">
                <div class="emoji">✏️</div>
                <div><h3>Practice Mode</h3><p>See correct answers instantly</p></div>
            </div>
            <div class="mode-card" onclick="startQuiz('exam')">
                <div class="emoji">🎯</div>
                <div><h3>Exam Mode</h3><p>Answers revealed at the end</p></div>
            </div>
        </div>
    </div>
    <div id="quiz-screen" class="hidden">
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="card">
            <div class="quiz-header">
                <span class="counter" id="question-counter"></span>
                <span class="score-pill" id="score-counter">Score: 0</span>
                <span class="mode-pill" id="mode-label">Practice</span>
            </div>
            <div class="q-number" id="q-number"></div>
            <div class="q-text" id="question-text"></div>
            <div class="options" id="options-list"></div>
            <div class="controls">
                <button class="next-btn outline" id="prev-btn" style="display:none">← Prev</button>
                <button class="next-btn" id="next-btn">Next →</button>
                <button class="next-btn outline" onclick="showScreen('subject')" style="font-size:.78rem">Menu</button>
            </div>
        </div>
    </div>
    <div id="result-screen" class="hidden">
        <div class="card result">
            <div class="trophy" id="trophy">🏆</div>
            <h2>Quiz Complete!</h2>
            <div class="big-score" id="final-score"></div>
            <div class="pct" id="percentage-display"></div>
            <div class="grade" id="grade-badge"></div><br>
            <div class="btn-row">
                <button class="action-btn primary" onclick="showScreen('mode')">🔄 Try Again</button>
                <button class="action-btn outline" onclick="showScreen('subject')">📚 All Subjects</button>
            </div>
        </div>
    </div>
</div>

<script>
// Questions will be loaded from external JSON
let SUBJECTS = {};
const CATALOG = {
    dbms: { name: "DBMS", icon: "🗄️", description: "Database Management Systems", unit: 1 },
    sepm: { name: "SEPM", icon: "📋", description: "Software Engineering & Project Management", unit: 1 },
    maths: { name: "Maths", icon: "📐", description: "Linear Algebra", unit: 1 },
    daa_unit2: { name: "DAA", icon: "📊", description: "Design and Analysis of Algorithms", unit: 2 },
    dbms_unit2: { name: "DBMS", icon: "🗄️", description: "Database Management Systems", unit: 2 },
    sepm_unit2: { name: "SEPM", icon: "📋", description: "Software Engineering & Project Management", unit: 2 },
    maths_unit2: { name: "Maths", icon: "📐", description: "Linear Algebra", unit: 2 },
    mp_unit2: { name: "MP & ES", icon: "🔌", description: "Microprocessor & Embedded Systems", unit: 2 }
};

let currentSubject = null;
let currentMode = null;
let questions = [];
let currentIndex = 0;
let score = 0;
let answers = [];

// Load questions from JSON file
async function loadQuestions() {
    try {
        const res = await fetch('all_questions.json');
        SUBJECTS = await res.json();
        renderSubjectGrid();
    } catch (e) {
        console.error('Failed to load questions:', e);
    }
}

function renderSubjectGrid() {
    const grid = document.getElementById('subject-grid');
    // Group by unit
    const unit1 = [], unit2 = [];
    for (const [key, meta] of Object.entries(CATALOG)) {
        if (SUBJECTS[key]?.length > 0) {
            (meta.unit === 1 ? unit1 : unit2).push({ key, ...meta, count: SUBJECTS[key].length });
        }
    }
    
    grid.innerHTML = '';
    
    if (unit1.length > 0) {
        grid.innerHTML += '<div style="color:var(--lime);font-size:.7rem;font-weight:800;margin:1rem 0 .5rem;letter-spacing:1px">UNIT 1</div>';
        unit1.forEach(s => {
            grid.innerHTML += `
                <div class="subject-card" onclick="selectSubject('${s.key}')">
                    <div class="emoji">${s.icon}</div>
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${s.description}</p>
                        <span class="q-badge">${s.count} MCQs</span>
                    </div>
                </div>`;
        });
    }
    
    if (unit2.length > 0) {
        grid.innerHTML += '<div style="color:var(--lime);font-size:.7rem;font-weight:800;margin:1.5rem 0 .5rem;letter-spacing:1px">UNIT 2</div>';
        unit2.forEach(s => {
            grid.innerHTML += `
                <div class="subject-card" onclick="selectSubject('${s.key}')">
                    <div class="emoji">${s.icon}</div>
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${s.description}</p>
                        <span class="q-badge">${s.count} MCQs</span>
                    </div>
                </div>`;
        });
    }
}

function showScreen(screen) {
    ['subject-screen', 'mode-screen', 'quiz-screen', 'result-screen'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(screen + '-screen').classList.remove('hidden');
}

function selectSubject(key) {
    currentSubject = key;
    const meta = CATALOG[key];
    document.getElementById('mode-icon').textContent = meta.icon;
    document.getElementById('mode-badge').textContent = 'UNIT ' + meta.unit;
    document.getElementById('mode-title').textContent = meta.name;
    document.getElementById('mode-desc').textContent = meta.description + ' • ' + SUBJECTS[key].length + ' questions';
    showScreen('mode');
}

function startQuiz(mode) {
    currentMode = mode;
    questions = [...SUBJECTS[currentSubject]];
    // Shuffle questions
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    currentIndex = 0;
    score = 0;
    answers = new Array(questions.length).fill(null);
    document.getElementById('mode-label').textContent = mode === 'practice' ? 'Practice' : 'Exam';
    showScreen('quiz');
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentIndex];
    const total = questions.length;
    
    document.getElementById('progress-bar').style.width = ((currentIndex + 1) / total * 100) + '%';
    document.getElementById('question-counter').textContent = `${currentIndex + 1} of ${total}`;
    document.getElementById('score-counter').textContent = `Score: ${score}`;
    document.getElementById('q-number').textContent = `Question ${currentIndex + 1}`;
    document.getElementById('question-text').innerHTML = q.question;
    
    const optList = document.getElementById('options-list');
    optList.innerHTML = '';
    
    const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = `<span class="lbl">${labels[i]}</span><span class="opt-text">${opt}</span>`;
        
        const answered = answers[currentIndex] !== null;
        const isUnit2 = CATALOG[currentSubject]?.unit === 2;
        
        if (answered) {
            btn.disabled = true;
            if (currentMode === 'practice') {
                // For Unit 2 practice mode, show selected answer as correct
                if (isUnit2) {
                    if (i === answers[currentIndex]) btn.classList.add('correct');
                } else {
                    if (i === q.answer) btn.classList.add('correct');
                    else if (i === answers[currentIndex]) btn.classList.add('incorrect');
                }
            } else {
                if (i === answers[currentIndex]) btn.classList.add('selected-exam');
            }
        } else if (currentMode === 'practice' && !isUnit2) {
            // Show correct answer immediately for Unit 1 practice mode
            if (i === q.answer) btn.classList.add('correct');
        }
        
        btn.onclick = () => selectAnswer(i);
        optList.appendChild(btn);
    });
    
    // Render math with KaTeX
    if (window.renderMathInElement) {
        renderMathInElement(document.getElementById('question-text'), {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\[', right: '\\]', display: true},
                {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false
        });
        renderMathInElement(optList, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
    
    // Navigation buttons
    document.getElementById('prev-btn').style.display = currentIndex > 0 ? 'block' : 'none';
    document.getElementById('next-btn').textContent = currentIndex === total - 1 ? 'Finish' : 'Next →';
}

function selectAnswer(idx) {
    if (answers[currentIndex] !== null) return;
    
    answers[currentIndex] = idx;
    const correct = questions[currentIndex].answer;
    
    // Check if current subject is Unit 2
    const isUnit2 = CATALOG[currentSubject]?.unit === 2;
    
    // Auto-correct for Unit 2 in practice mode
    if (currentMode === 'practice' && isUnit2) {
        score++;  // Always give score for Unit 2 practice mode
    } else if (idx === correct) {
        score++;
    }
    
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach((btn, i) => {
        btn.disabled = true;
        if (currentMode === 'practice') {
            // For Unit 2 practice mode, mark selected answer as correct
            if (isUnit2) {
                if (i === idx) btn.classList.add('correct');
            } else {
                if (i === correct) btn.classList.add('correct');
                else if (i === idx) btn.classList.add('incorrect');
            }
        } else {
            if (i === idx) btn.classList.add('selected-exam');
        }
    });
    
    document.getElementById('score-counter').textContent = `Score: ${score}`;
}

document.getElementById('next-btn').onclick = () => {
    if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
    } else {
        showResults();
    }
};

document.getElementById('prev-btn').onclick = () => {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
};

function showResults() {
    const total = questions.length;
    const pct = Math.round(score / total * 100);
    
    document.getElementById('final-score').textContent = `${score}/${total}`;
    document.getElementById('percentage-display').textContent = `${pct}% correct`;
    
    const badge = document.getElementById('grade-badge');
    const trophy = document.getElementById('trophy');
    
    if (pct >= 90) {
        badge.className = 'grade grade-a';
        badge.textContent = 'Excellent! A+';
        trophy.textContent = '🏆';
    } else if (pct >= 75) {
        badge.className = 'grade grade-b';
        badge.textContent = 'Good Job! B';
        trophy.textContent = '🎉';
    } else if (pct >= 50) {
        badge.className = 'grade grade-c';
        badge.textContent = 'Keep Practicing C';
        trophy.textContent = '💪';
    } else {
        badge.className = 'grade grade-f';
        badge.textContent = 'Need More Study';
        trophy.textContent = '📖';
    }
    
    showScreen('result');
}

// Initialize
document.addEventListener('DOMContentLoaded', loadQuestions);
</script>
</body>
</html>
